<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Calculadora de IMC</h1>
            <p class="subtitle">Descubra agora seu Índice de Massa Corporal</p>
        </header>

        <main class="main-content">
            <div class="card">
                <form id="imcForm" class="form">
                    <div class="form-group">
                        <label for="weight">Peso (kg)</label>
                        <input 
                            type="number" 
                            id="weight" 
                            name="weight" 
                            min="20" 
                            max="300" 
                            step="0.1"
                            placeholder="Ex: 75"
                            required
                            aria-label="Peso em quilogramas">
                        <span class="input-icon">⚖️</span>
                    </div>

                    <div class="form-group">
                        <label for="height">Altura (cm)</label>
                        <input 
                            type="number" 
                            id="height" 
                            name="height" 
                            min="100" 
                            max="250" 
                            step="0.1"
                            placeholder="Ex: 175"
                            required
                            aria-label="Altura em centímetros">
                        <span class="input-icon">📏</span>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-primary">📊 Calcular IMC</button>
                        <button type="reset" class="btn btn-secondary">🔄 Limpar</button>
                    </div>
                </form>

                <div id="result" class="result" aria-live="polite" aria-atomic="true"></div>
                <div id="category" class="category" aria-live="polite"></div>
                <div id="advice" class="advice"></div>
            </div>

            <div class="card info-card">
                <h2>📈 Tabela de Classificação</h2>
                <table class="imc-table">
                    <thead>
                        <tr>
                            <th>Classificação</th>
                            <th>IMC</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="underweight">
                            <td>Abaixo do peso</td>
                            <td>< 18,5</td>
                        </tr>
                        <tr class="normal">
                            <td>Peso normal</td>
                            <td>18,5 - 24,9</td>
                        </tr>
                        <tr class="overweight">
                            <td>Sobrepeso</td>
                            <td>25,0 - 29,9</td>
                        </tr>
                        <tr class="obese">
                            <td>Obesidade Grau I</td>
                            <td>30,0 - 34,9</td>
                        </tr>
                        <tr class="severe-obese">
                            <td>Obesidade Grau II</td>
                            <td>35,0 - 39,9</td>
                        </tr>
                        <tr class="critical-obese">
                            <td>Obesidade Grau III</td>
                            <td>≥ 40,0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
